trigger:
  - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  terraformVersion: '1.12.2'
  workingDirectory: 'azure-infra-project/dev-proj'

stages:
- stage: TerraformPlan
  jobs:
  - job: Plan
    steps:
    - checkout: self
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)
    - task: AWSShellScript@1
      inputs:
        awsCredentials: 'Aws-connection'
        regionName: 'ap-south-1'
        scriptType: 'inline'
        inlineScript: |
          cd $(workingDirectory)
          terraform init
          terraform validate
          terraform plan -out=tfplan
    - publish: $(workingDirectory)/tfplan
      artifact: tfplan

- stage: Approval
  jobs:
  - job: Wait
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: 'Approve Deployment'

- stage: TerraformApply
  dependsOn: Approval
  jobs:
  - job: Apply
    steps:
    - checkout: self
    - download: current
      artifact: tfplan
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)
    - task: AWSShellScript@1
      inputs:
        awsCredentials: 'aws-connection'
        regionName: 'ap-south-1'
        scriptType: 'inline'
        inlineScript: |
          cd $(workingDirectory)
          terraform init
          terraform apply -auto-approve tfplan